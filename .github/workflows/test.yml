name: test

on:
  push:
  pull_request:

jobs:
  python:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.9', '3.12']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m unittest discover -s tests -v
      - run: python skills/aiaiai-image/scripts/aiaiai_image.py generate --api-key test-key --prompt test --out test.png --dry-run
